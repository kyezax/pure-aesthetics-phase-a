databases:
  - name: pure-aesthetics-db
    plan: free
    databaseName: pure_aesthetics
    user: pure_aesthetics

services:
  - type: web
    name: pure-aesthetics-backend
    env: python
    rootDir: backend
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn server:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: ADMIN_EMAIL
        value: admin@pureaesthetics.example
      - key: ADMIN_PASSWORD
        generateValue: true
      - key: CORS_ORIGINS
        value: "*"
      - key: DATABASE_URL
        fromDatabase:
          name: pure-aesthetics-db
          property: connectionString
